<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sistema Declaração de Saúde</title>
<style>
:root{--bg:#f4f7fb;--panel:#fff;--line:#d7e2ef;--text:#0f172a;--muted:#64748b;--blue:#2563eb;--green:#16a34a;--orange:#ea580c;--danger:#dc2626;--shadow:0 10px 28px rgba(15,23,42,.08)}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
button{font:inherit;cursor:pointer}
.app{display:grid;grid-template-columns:340px 1fr;min-height:100vh}
.sidebar{background:#fff;border-right:1px solid var(--line);padding:18px;display:flex;flex-direction:column;gap:16px}
.content{padding:16px}
@media (max-width:1100px){.app{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:1px solid var(--line)}}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
.group-card{padding:16px}
.group-head h3{margin:0;font-size:15px}
.group-head p{margin:6px 0 0 0;color:var(--muted);font-size:13px;line-height:1.4}
.group-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.group-actions-stack{display:grid;grid-template-columns:1fr;gap:10px;margin-top:14px}
.group-actions-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}
.btn{border:none;border-radius:12px;padding:11px 12px;font-weight:700}
.btn-blue{background:#2563eb;color:#fff}
.btn-green{background:#16a34a;color:#fff}
.btn-soft{background:#e2e8f0;color:#0f172a}
.btn-danger{background:#fee2e2;color:#991b1b}
.badge{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700}
.badge.unimed{background:#ecfdf5;color:#15803d}
.badge.intermed{background:#fff7ed;color:#c2410c}
.main-panel{display:none}
.main-panel.active{display:block}
.panel-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.panel-top h1{margin:4px 0 2px 0;font-size:18px;line-height:1.2}
.panel-top p{margin:0;color:var(--muted);font-size:12px}
.workspace{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}
.tabs-bar{display:flex;align-items:flex-end;gap:6px;padding:10px 14px 0 14px;background:linear-gradient(#eef4fb,#e8f0f9);border-bottom:1px solid #d5e2f0;overflow:auto}
.chrome-tab{position:relative;border:none;background:linear-gradient(#e7edf5,#d8e1ec);color:#334155;padding:12px 40px 11px 18px;border-radius:16px 16px 0 0;min-width:190px;text-align:left;font-weight:700;box-shadow:inset 0 -1px 0 rgba(15,23,42,.08)}
.chrome-tab small{display:block;font-size:11px;font-weight:500;color:#64748b;margin-top:2px}
.chrome-tab.active{background:#fff;color:#0f172a;box-shadow:0 -1px 0 #fff, 0 2px 8px rgba(15,23,42,.04)}
.chrome-tab.has-data::after{content:'';position:absolute;right:30px;top:14px;width:8px;height:8px;border-radius:999px;background:#22c55e}
.chrome-tab:focus{outline:2px solid rgba(37,99,235,.25);outline-offset:1px}
.tabs-content{padding:0;background:#f8fbff}
.tab-pane{display:none}
.tab-pane.active{display:block}
.instance-toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:0;background:transparent;border-bottom:none}
.instance-toolbar .left small{display:block;color:var(--muted);margin-top:2px;font-size:12px}
.instance-actions{display:flex;gap:8px;flex-wrap:wrap}
.panel-top-actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.tab-close{position:absolute;right:10px;top:10px;width:22px;height:22px;border:none;border-radius:999px;background:transparent;color:#64748b;font-size:14px;font-weight:700;line-height:1}
.tab-close:hover{background:rgba(148,163,184,.22);color:#0f172a}
.tab-close:focus{outline:2px solid rgba(37,99,235,.25)}
.tab-close:disabled{opacity:.35;cursor:not-allowed}
.mini-add{background:#dbeafe;color:#1d4ed8}
.mini-btn{border:none;border-radius:14px;padding:16px 24px;font-size:20px;font-weight:800;min-height:62px;box-shadow:0 6px 18px rgba(15,23,42,.08)}
.mini-clear{background:#fef3c7;color:#92400e}
.mini-blue{background:#dbeafe;color:#1d4ed8}
.form-frame{width:100%;height:1220px;border:none;display:block;background:#f8fbff}


html,body{height:100%;overflow:hidden}
.app{height:100vh;overflow:hidden}
.sidebar{overflow:auto}
.content{height:100vh;overflow:hidden}
.main-panel{display:none;height:100%;overflow:hidden}
.main-panel.active{display:block}
.workspace{height:calc(100vh - 128px);display:flex;flex-direction:column;overflow:hidden}
.tabs-bar{flex:0 0 auto}
.tabs-content{flex:1 1 auto;overflow:hidden}
.tab-pane{display:none;height:100%}
.tab-pane.active{display:block}
.form-frame{width:100%;height:100%;min-height:0;border:none;display:block;background:#f8fbff}


.sidebar-operator-card{transition:all .18s ease}
.sidebar-operator-card.is-active{border-color:#93c5fd;box-shadow:0 12px 30px rgba(37,99,235,.12)}
.sidebar-operator-card.is-inactive{opacity:.96}
.sidebar-operator-card .decl-btn{transition:all .18s ease}
.sidebar-operator-card.is-active .decl-btn{background:#2563eb;color:#fff}
.sidebar-operator-card.is-inactive .decl-btn{background:#ffffff;color:#1d4ed8;border:2px solid #bfdbfe}
.sidebar-operator-card .viz-btn[disabled]{background:#e5e7eb !important;color:#94a3b8 !important;cursor:not-allowed !important;box-shadow:none !important;opacity:1}
.sidebar-operator-card .viz-btn:not([disabled]){background:#2563eb;color:#fff}


.sidebar-operator-card{transition:all .18s ease}
.sidebar-operator-card .decl-btn,
.sidebar-operator-card .viz-btn{transition:all .18s ease}
.sidebar-operator-card.is-active{
  border:2px solid #2563eb !important;
  box-shadow:0 10px 25px rgba(37,99,235,.20) !important;
  background:#f8fbff !important;
}
.sidebar-operator-card.is-active .decl-btn{
  background:#2563eb !important;
  color:#fff !important;
  border:2px solid #2563eb !important;
}
.sidebar-operator-card.is-active .viz-btn:not([disabled]){
  background:#2563eb !important;
  color:#fff !important;
  border:2px solid #2563eb !important;
}
.sidebar-operator-card.is-inactive{
  border:1px solid var(--line) !important;
  box-shadow:none !important;
  background:#fff !important;
}
.sidebar-operator-card.is-inactive .decl-btn{
  background:#ffffff !important;
  color:#1d4ed8 !important;
  border:2px solid #bfdbfe !important;
}
.sidebar-operator-card .viz-btn[disabled]{
  background:#f3f4f6 !important;
  color:#9ca3af !important;
  border:2px solid #e5e7eb !important;
  cursor:not-allowed !important;
  box-shadow:none !important;
  opacity:1 !important;
}


/* toolbar fixa/visível para instâncias */
.instance-toolbar-main{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  align-items:center;
  margin:10px 0 12px 0;
}
.sidebar-operator-card .decl-btn,
.sidebar-operator-card .viz-btn{
  pointer-events:auto !important;
  opacity:1 !important;
}
.sidebar-operator-card.is-inactive .viz-btn,
.sidebar-operator-card.is-inactive .viz-btn[disabled]{
  background:#f3f4f6 !important;
  color:#9ca3af !important;
  border:2px solid #e5e7eb !important;
  cursor:not-allowed !important;
  box-shadow:none !important;
}

</style>

</head>
<body>
<div class="app">
<aside class="sidebar">
<div class="group-card card">
<div class="group-head">
<h3>Sistema Declaração de Saúde</h3>
<p>Preenchimento direto no PDF.</p>
</div>
</div>
<div class="group-card card sidebar-operator-card is-active" id="card-unimed">
<div class="group-head">
<span class="badge unimed">UNIMED</span>
<h3 style="margin-top:10px">Declaração de Saúde Unimed</h3>
<p></p>
</div>
<div class="group-actions-stack">
<button class="btn decl-btn" data-op="unimed" onclick="showPanel('unimed')">DECLARAÇÃO UNIMED</button>
<button class="btn viz-btn" data-op="unimed" id="viz-unimed" onclick="visualize('unimed')" aria-disabled="false" title="Visualizar UNIMED">VISUALIZAR</button>
</div>
</div>
<div class="group-card card sidebar-operator-card is-inactive" id="card-intermed">
<div class="group-head">
<span class="badge intermed">INTERMED</span>
<h3 style="margin-top:10px">Declaração de Saúde Intermed</h3>
<p></p>
</div>
<div class="group-actions-stack">
<button class="btn decl-btn" data-op="intermed" onclick="showPanel('intermed')">DECLARAÇÃO INTERMED</button>
<button class="btn viz-btn" data-op="intermed" id="viz-intermed" onclick="visualize('intermed')" disabled aria-disabled="true" title="Selecione a declaração INTERMED para visualizar">VISUALIZAR</button>
</div>
</div>
</aside>
<main class="content">
<section class="main-panel active" id="panel-unimed">
<div class="panel-top">
<div><span class="badge unimed">UNIMED</span><h1>Declaração de Saúde Unimed</h1><p>Instâncias em abas</p></div>
</div>
<div class="instance-toolbar-main" id="toolbar-unimed">
<button class="mini-btn mini-clear" data-action="clear" data-id="1" data-op="unimed" type="button">DEIXAR EM BRANCO</button>
<button class="mini-btn mini-add" data-action="add" data-op="unimed" type="button">+ NOVA INSTÂNCIA</button>
</div>
<div class="workspace">
<div class="tabs-bar" id="tabs-unimed"><button class="chrome-tab active" data-id="1" type="button">Instância 1<small>Em branco</small></button></div>
<div class="tabs-content" id="panes-unimed"><div class="tab-pane active" data-id="1"><iframe class="form-frame" id="frame-unimed-1" src="DECLARACAO_SAUDE_UNIMED.html?operator=unimed&amp;instance=1"></iframe></div></div>
</div>
</section>
<section class="main-panel" id="panel-intermed">
<div class="panel-top">
<div><span class="badge intermed">INTERMED</span><h1>Declaração de Saúde Intermed</h1><p>Instâncias em abas</p></div>
</div>
<div class="instance-toolbar-main" id="toolbar-intermed">
<button class="mini-btn mini-clear" data-action="clear" data-id="1" data-op="intermed" type="button">DEIXAR EM BRANCO</button>
<button class="mini-btn mini-add" data-action="add" data-op="intermed" type="button">+ NOVA INSTÂNCIA</button>
</div>
<div class="workspace">
<div class="tabs-bar" id="tabs-intermed"><button class="chrome-tab active" data-id="1" type="button">Instância 1<small>Em branco</small></button></div>
<div class="tabs-content" id="panes-intermed"><div class="tab-pane active" data-id="1"><iframe class="form-frame" id="frame-intermed-1" src="DECLARACAO_SAUDE_INTERMED.html?operator=intermed&amp;instance=1"></iframe></div></div>
</div>
</section>
</main>
</div>




<script defer="defer" src="lib/pdf-lib.min.js"></script><script defer="defer" src="pdf_templates.js"></script><script defer="defer" src="pdf_positions.js"></script><script defer="defer" src="app.js"></script></body>
</html>

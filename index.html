<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Sistema Declaração de Saúde V8</title>
<style>
:root{--bg:#f4f7fb;--panel:#fff;--line:#d7e2ef;--text:#0f172a;--muted:#64748b;--blue:#2563eb;--green:#16a34a;--orange:#ea580c;--danger:#dc2626;--shadow:0 10px 28px rgba(15,23,42,.08)}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
button{font:inherit;cursor:pointer}
.app{display:grid;grid-template-columns:340px 1fr;min-height:100vh}
.sidebar{background:#fff;border-right:1px solid var(--line);padding:18px;display:flex;flex-direction:column;gap:16px}
.content{padding:16px}
@media (max-width:1100px){.app{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:1px solid var(--line)}}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
.group-card{padding:16px}
.group-head h3{margin:0;font-size:15px}
.group-head p{margin:6px 0 0 0;color:var(--muted);font-size:13px;line-height:1.4}
.group-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.group-actions-stack{display:grid;grid-template-columns:1fr;gap:10px;margin-top:14px}
.group-actions-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}
.btn{border:none;border-radius:12px;padding:11px 12px;font-weight:700}
.btn-blue{background:#2563eb;color:#fff}
.btn-green{background:#16a34a;color:#fff}
.btn-soft{background:#e2e8f0;color:#0f172a}
.btn-danger{background:#fee2e2;color:#991b1b}
.badge{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700}
.badge.unimed{background:#ecfdf5;color:#15803d}
.badge.intermed{background:#fff7ed;color:#c2410c}
.main-panel{display:none}
.main-panel.active{display:block}
.panel-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.panel-top h1{margin:4px 0 2px 0;font-size:18px;line-height:1.2}
.panel-top p{margin:0;color:var(--muted);font-size:12px}
.workspace{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}
.tabs-bar{display:flex;align-items:flex-end;gap:6px;padding:10px 14px 0 14px;background:linear-gradient(#eef4fb,#e8f0f9);border-bottom:1px solid #d5e2f0;overflow:auto}
.chrome-tab{position:relative;border:none;background:linear-gradient(#e7edf5,#d8e1ec);color:#334155;padding:12px 40px 11px 18px;border-radius:16px 16px 0 0;min-width:190px;text-align:left;font-weight:700;box-shadow:inset 0 -1px 0 rgba(15,23,42,.08)}
.chrome-tab small{display:block;font-size:11px;font-weight:500;color:#64748b;margin-top:2px}
.chrome-tab.active{background:#fff;color:#0f172a;box-shadow:0 -1px 0 #fff, 0 2px 8px rgba(15,23,42,.04)}
.chrome-tab.has-data::after{content:'';position:absolute;right:30px;top:14px;width:8px;height:8px;border-radius:999px;background:#22c55e}
.chrome-tab:focus{outline:2px solid rgba(37,99,235,.25);outline-offset:1px}
.tabs-content{padding:0;background:#f8fbff}
.tab-pane{display:none}
.tab-pane.active{display:block}
.instance-toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:0;background:transparent;border-bottom:none}
.instance-toolbar .left small{display:block;color:var(--muted);margin-top:2px;font-size:12px}
.instance-actions{display:flex;gap:8px;flex-wrap:wrap}
.panel-top-actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.tab-close{position:absolute;right:10px;top:10px;width:22px;height:22px;border:none;border-radius:999px;background:transparent;color:#64748b;font-size:14px;font-weight:700;line-height:1}
.tab-close:hover{background:rgba(148,163,184,.22);color:#0f172a}
.tab-close:focus{outline:2px solid rgba(37,99,235,.25)}
.tab-close:disabled{opacity:.35;cursor:not-allowed}
.mini-add{background:#dbeafe;color:#1d4ed8}
.mini-btn{border:none;border-radius:14px;padding:16px 24px;font-size:20px;font-weight:800;min-height:62px;box-shadow:0 6px 18px rgba(15,23,42,.08)}
.mini-clear{background:#fef3c7;color:#92400e}
.mini-blue{background:#dbeafe;color:#1d4ed8}
.form-frame{width:100%;height:1220px;border:none;display:block;background:#f8fbff}
.preview-body{background:#d8dde6;margin:0}
.preview-wrap{padding:14px 0 40px}
.doc-block{margin:0 0 26px 0}
.doc-sep{display:none !important}
.pdf-page{position:relative;width:210mm;height:297mm;margin:0 auto 14px auto;background:#fff;box-shadow:0 8px 30px rgba(15,23,42,.12);overflow:hidden}
.pdf-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.overlay{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none}
.fill{position:absolute;color:#111827;font-size:12px;line-height:1.15;white-space:pre-wrap;word-break:break-word;min-height:18px;padding:1px 2px;box-sizing:border-boxfont-weight:700 !important;}
.fill.small{font-size:11px}
.fill.center{text-align:center}
.fill.check{display:flex;align-items:center;justify-content:center;line-height:1.15;padding:1px 2px;box-sizing:border-boxfont-weight:900 !important;}
.check{font-size:18px;font-weight:900}
.empty-state{width:210mm;height:297mm;margin:0 auto;background:#fff;display:flex;align-items:center;justify-content:center;text-align:center;box-shadow:0 8px 30px rgba(15,23,42,.12);padding:30mm}
@media print{@page{size:A4;margin:0}html,body{height:auto !important;overflow:visible !important}body{background:#fff}.preview-wrap{padding:0 !important;overflow:visible !important}.doc-block{margin:0 !important;padding:0 !important;break-inside:avoid}.pdf-page,.empty-state{margin:0 !important;box-shadow:none !important;page-break-after:always;break-after:page}.pdf-page:last-child,.empty-state:last-child{page-break-after:auto;break-after:auto}.doc-sep{display:none !important}}

    for(let i=0;i<sessionStorage.length;i++){ keys.push(sessionStorage.key(i)); }
    keys.forEach(k => {
      if(/^ds_tabs_/.test(k) || k === 'ds_tabs_system_state_v8'){
        sessionStorage.removeItem(k);
      }
    });

<body>
<div class="app">
  <aside class="sidebar">
    <div class="group-card card">
      <div class="group-head">
        <h3>Sistema Declaração de Saúde</h3>
        <p>Index centraliza as funcionalidades. Os formulários ficam em HTMLs separados.</p>
      </div>
    </div>

    <div class="group-card card sidebar-operator-card" id="card-unimed">
      <div class="group-head">
        <span class="badge unimed">UNIMED</span>
        <h3 style="margin-top:10px">Declaração de Saúde Unimed</h3>
        <p></p>
      </div>
      <div class="group-actions-stack">
        <button class="btn decl-btn" data-op="unimed" onclick="showPanel('unimed')">DECLARAÇÃO UNIMED</button>
        <button class="btn viz-btn" id="viz-unimed" data-op="unimed" onclick="visualize('unimed')">VISUALIZAR</button>
      </div>
    </div>

    <div class="group-card card sidebar-operator-card" id="card-intermed">
      <div class="group-head">
        <span class="badge intermed">INTERMED</span>
        <h3 style="margin-top:10px">Declaração de Saúde Intermed</h3>
        <p></p>
      </div>
      <div class="group-actions-stack">
        <button class="btn decl-btn" data-op="intermed" onclick="showPanel('intermed')">DECLARAÇÃO INTERMED</button>
        <button class="btn viz-btn" id="viz-intermed" data-op="intermed" onclick="visualize('intermed')">VISUALIZAR</button>
      </div>
    </div>
  </aside>

  <main class="content">
    <section id="panel-unimed" class="main-panel active"></section>
    <section id="panel-intermed" class="main-panel"></section>
  </main>
</div>

<script src="pdf_pages.js"></script>
<script>
const MAX_INSTANCES = 5;
const META = {
  unimed: { title:'Declaração de Saúde Unimed', file:'DECLARACAO_SAUDE_UNIMED.html', badge:'UNIMED', theme:'unimed' },
  intermed: { title:'Declaração de Saúde Intermed', file:'DECLARACAO_SAUDE_INTERMED.html', badge:'INTERMED', theme:'intermed' }
};
const PDF_PAGES = window.DS_PDF_PAGES;
let state = loadState();

function loadState() {
  return {
    activePanel:'unimed',
    counts:{unimed:1, intermed:1},
    activeTabs:{unimed:1, intermed:1}
  };
}
function saveState() {
  sessionStorage.setItem('ds_tabs_system_state_v8', JSON.stringify(state));
}
function storageKey(op,id) {
  return `ds_tabs_${op}_${id}`;
}
function readStored(op,id) {
  try {
    return JSON.parse(sessionStorage.getItem(storageKey(op,id)) || 'null');
  } catch(e) {
    return null;
  }
}
function hasDataObj(data) {
  if(!data) return false;
  return Object.entries(data).some(([k,v]) => !['operator','instanceId'].includes(k) && String(v||'').trim() !== '');
}
function updateSidebarSelection() {
  ['unimed','intermed'].forEach(op => {
    const active = state.activePanel === op;
    let card = document.getElementById(`card-${op}`);
    if(!card){
      const btn = document.querySelector(`.decl-btn[data-op="${op}"]`);
      card = btn ? btn.closest('.sidebar-operator-card') : null;
    }
    const viz = document.getElementById(`viz-${op}`);
    if(card){
      card.classList.toggle('is-active', active);
      card.classList.toggle('is-inactive', !active);
    }
    if(viz){
      viz.disabled = !active;
      viz.setAttribute('aria-disabled', String(!active));
      viz.title = active ? '' : `Selecione ${META[op].badge} para visualizar`;
    }
  });
}
function showPanel(op) {
  state.activePanel = op;
  saveState();
  document.querySelectorAll('.main-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(`panel-${op}`).classList.add('active');
  updateSidebarSelection();
}
function setActiveTab(op,id) {
  state.activeTabs[op] = id;
  saveState();
  buildWorkspace(op);
  showPanel(op);
}
function syncActiveTab(op) {
  const activeId = state.activeTabs[op] || 1;
  document.querySelectorAll(`#panel-${op} .chrome-tab`).forEach(btn => {
    btn.classList.toggle('active', Number(btn.dataset.id) === Number(activeId));
  });
  document.querySelectorAll(`#panel-${op} .tab-pane`).forEach(pane => {
    pane.classList.toggle('active', Number(pane.dataset.id) === Number(activeId));
  });
}
function buildWorkspace(op) {
  const panel = document.getElementById(`panel-${op}`);
  const activeId = state.activeTabs[op] || 1;
  panel.innerHTML = `
    <div class="panel-top">
      <div>
        <span class="badge ${META[op].theme}">${META[op].badge}</span>
        <h1>${META[op].title}</h1>
        <p>Instâncias em abas</p>
      </div>
      <div class="panel-top-actions">
        <button class="mini-btn mini-clear" onclick="clearInstance('${op}', ${activeId})">Deixar em branco</button>
        <button class="mini-btn mini-add" onclick="addInstance('${op}')">+ Adicionar Instância</button>
      </div>
    </div>
    <div class="workspace">
      <div class="tabs-bar" id="tabs-${op}"></div>
      <div class="tabs-content" id="panes-${op}"></div>
    </div>`;
  buildTabsAndPanes(op);
}
function buildTabsAndPanes(op) {
  const tabsWrap = document.getElementById(`tabs-${op}`);
  const panesWrap = document.getElementById(`panes-${op}`);
  tabsWrap.innerHTML = '';
  panesWrap.innerHTML = '';
  for(let i=1;i<=state.counts[op];i++) {
    const hasData = hasDataObj(readStored(op,i));
    const tab = document.createElement('button');
    tab.className = `chrome-tab ${hasData ? 'has-data' : ''}`;
    tab.dataset.id = i;
    tab.innerHTML = `Instância ${i}<small>${hasData ? 'Preenchida' : 'Em branco'}</small><button class="tab-close" type="button" ${state.counts[op]===1 ? 'disabled' : ''} onclick="event.stopPropagation(); closeInstance('${op}', ${i})">×</button>`;
    tab.onclick = () => setActiveTab(op, i);
    tabsWrap.appendChild(tab);

    const pane = document.createElement('div');
    pane.className = 'tab-pane';
    pane.dataset.id = i;
    pane.innerHTML = `
      <iframe class="form-frame" id="frame-${op}-${i}" src="${META[op].file}?instance=${i}"></iframe>`;
    panesWrap.appendChild(pane);
  }
  if((state.activeTabs[op] || 1) > state.counts[op]) state.activeTabs[op] = state.counts[op];
  syncActiveTab(op);
}
function refreshTabIndicators(op) {
  document.querySelectorAll(`#panel-${op} .chrome-tab`).forEach(tab => {
    const id = Number(tab.dataset.id);
    const filled = hasDataObj(readStored(op, id));
    tab.classList.toggle('has-data', filled);
    const small = tab.querySelector('small');
    if(small) small.textContent = filled ? 'Preenchida' : 'Em branco';
  });
}
function addInstance(op) {
  if(state.counts[op] >= MAX_INSTANCES) return;
  state.counts[op] += 1;
  state.activeTabs[op] = state.counts[op];
  saveState();
  buildWorkspace(op);
  showPanel(op);
}
function closeInstance(op,id) {
  if(state.counts[op] <= 1) return;
  for(let i=id;i<state.counts[op];i++) {
    const next = sessionStorage.getItem(storageKey(op, i + 1));
    if(next === null) sessionStorage.removeItem(storageKey(op, i));
    else sessionStorage.setItem(storageKey(op, i), next);
  }
  sessionStorage.removeItem(storageKey(op, state.counts[op]));
  state.counts[op] -= 1;
  if(state.activeTabs[op] === id) state.activeTabs[op] = Math.max(1, id - 1);
  else if(state.activeTabs[op] > id) state.activeTabs[op] -= 1;
  saveState();
  buildWorkspace(op);
  showPanel(op);
}
function clearInstance(op,id) {
  sessionStorage.removeItem(storageKey(op,id));
  const frame = document.getElementById(`frame-${op}-${id}`);
  try {
    frame.contentWindow.postMessage({type:'ds-clear-instance', operator:op, instanceId:id}, '*');
  } catch(e) {}
  setTimeout(()=>refreshTabIndicators(op), 30);
}

window.addEventListener('message', (ev) => {
  if(ev.data?.type === 'ds-form-update') {
    sessionStorage.setItem(storageKey(ev.data.operator, ev.data.instanceId), JSON.stringify(ev.data.data || {}));
    refreshTabIndicators(ev.data.operator);
  }
});

const OVERLAY_SCHEMA = OVERLAY_SCHEMAS.unimed;
const SCHEMA_PAGE_WIDTH = 210;
const SCHEMA_PAGE_HEIGHT = 297;
function esc(v) {
  return String(v||'').replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]));
}
function t(v) { return esc(v || ''); }
function check(v) { return v ? '✔' : ''; }

function normalizeValue(v) {
  return String(v || '').normalize('NFD').replace(/[̀-ͯ]/g, '').trim().toUpperCase();
}
function getValueByAliases(data, keys) {
  for(const key of keys) {
    if(Object.prototype.hasOwnProperty.call(data, key) && data[key] !== undefined && data[key] !== null && String(data[key]) !== '') {
      return data[key];
    }
  }
  return '';
}
function getFieldDisplayValue(field, data) {
  if(field.type === 'check') {
    if(field.when && field.when.field) {
      const current = normalizeValue(getValueByAliases(data, [field.when.field]));
      const expected = normalizeValue(field.when.equals);
      return check(current === expected);
    }
    return '';
  }
  let raw = '';
  if(field.key === 'responsavelData') {
    raw = getValueByAliases(data, ['responsavelData','dataLocal']);
  } else {
    raw = getValueByAliases(data, [field.key]);
  }
  return t(String(raw || '').toUpperCase());
}


function readFrameFormData(frame) {
  try {
    const doc = frame && frame.contentDocument;
    if(!doc) return null;
    const data = {};
    doc.querySelectorAll('input,select,textarea').forEach(el => {
      if(!el.name) return;
      if(el.type === 'radio') {
        if(el.checked) data[el.name] = el.value;
      } else {
        data[el.name] = el.value || '';
      }
    });
    return data;
  } catch(e) {
    return null;
  }
}

async function syncAllFrameData(op) {
  const waiters = [];
  for(let i=1;i<=state.counts[op];i++) {
    const frame = document.getElementById(`frame-${op}-${i}`);
    if(!frame) continue;

    // tentativa imediata de leitura direta do DOM do iframe
    const immediate = readFrameFormData(frame);
    if(immediate) {
      sessionStorage.setItem(storageKey(op, i), JSON.stringify(immediate));
    }

    // pede ao iframe para persistir o estado atual antes da visualização
    waiters.push(new Promise(resolve => {
      let done = false;
      const finish = () => {
        if(done) return;
        done = true;
        window.removeEventListener('message', onMsg);
        const latest = readFrameFormData(frame);
        if(latest) sessionStorage.setItem(storageKey(op, i), JSON.stringify(latest));
        resolve();
      };
      const onMsg = (ev) => {
        if(ev.data?.type === 'ds-sync-done' && ev.data.operator === op && String(ev.data.instanceId) === String(i)) {
          finish();
        }
      };
      window.addEventListener('message', onMsg);
      try {
        frame.contentWindow.postMessage({type:'ds-request-sync', operator:op, instanceId:i}, '*');
      } catch(e) {}
      setTimeout(finish, 180);
    }));
  }
  await Promise.all(waiters);
  refreshTabIndicators(op);
}

function fieldStyle(field) {
  const left = Number(field.x) || 0;
  const top = Number(field.y) || 0;
  const width = Number(field.w) || 0;
  const base = [
    `left:${left}mm`,
    `top:${top}mm`,
    `width:${width}mm`,
    `font-size:${Number(field.fs)||11}px`,
    'font-weight:700'
  ];
  if(field.align) base.push(`text-align:${field.align}`);
  if(field.type === 'check') base.push(
    'text-align:center',
    'display:flex',
    'align-items:center',
    'justify-content:center',
    'height:24px',
    'font-weight:900',
    'line-height:1.15'
  );
  return base.join(';');
}

function schemaForOperator(op) {
  return (OVERLAY_SCHEMAS && OVERLAY_SCHEMAS[op]) || OVERLAY_SCHEMA;
}

function dataPages(op, data) {
  const bg = PDF_PAGES[op];
  const schema = schemaForOperator(op);
  const pages = [];
  for(let page=1; page<=schema.pages; page++) {
    const fields = schema.fields.filter(f => Number(f.page) === page);
    const html = fields.map(field => `<div class="fill${field.type === 'check' ? ' check center' : ''}" style="${fieldStyle(field)}">${getFieldDisplayValue(field, data)}</div>`).join('');
    pages.push(`<div class="pdf-page"><img class="pdf-bg" src="${bg[page-1]}"><div class="overlay">${html}</div></div>`);
  }
  return pages;
}


async function visualize(op) {
  await syncAllFrameData(op);
  const docs = [];
  for(let i=1;i<=state.counts[op];i++) {
    const d = readStored(op,i) || {};
    docs.push({ instance:i, data:d });
  }
  const win = window.open('', '_blank');
  const title = `${META[op].badge} - Visualização`;
  let body = docs.map((doc, idx) => `<div class="doc-block">${dataPages(op, doc.data).join('')}</div>`).join('');
  win.document.write(`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>${title}</title><style>${document.querySelector('style').textContent}

html,body{height:auto !important;overflow:auto !important}
body.preview-body{background:#d8dde6 !important;margin:0 !important}
.preview-wrap{padding:14px 0 40px;overflow:visible !important}
.doc-block{margin:0 0 14px 0;padding:0}
.app,.sidebar,.content,.main-panel,.workspace,.tabs-content,.tab-pane{height:auto !important;overflow:visible !important}


.sidebar-operator-card{transition:all .18s ease}
.sidebar-operator-card.is-active{border-color:#93c5fd;box-shadow:0 12px 30px rgba(37,99,235,.12)}
.sidebar-operator-card.is-inactive{opacity:.96}
</style></head><body class="preview-body"><div class="preview-wrap">${body}</div></body></html>`);
  win.document.close();
}

function renderAll() {
  buildWorkspace('unimed');
  buildWorkspace('intermed');
  showPanel(state.activePanel || 'unimed');
  updateSidebarSelection();
}
